---
# Application Deployment for Kubernetes deployment tests.
# Uses imagePullPolicy: Never — the image must be loaded into k3s beforehand.
# The test class handles image loading via docker save + k3s ctr import.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-streaming
  namespace: default
  labels:
    app: dlq-streaming
    app.kubernetes.io/name: dlq-streaming
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-streaming
  template:
    metadata:
      labels:
        app: dlq-streaming
        app.kubernetes.io/name: dlq-streaming
        app.kubernetes.io/component: app
    spec:
      # No service account token needed for this stateless service.
      automountServiceAccountToken: false

      containers:
        - name: dlq-streaming
          image: dlq-streaming:k8s-test
          # Never pull — the image is loaded directly into k3s containerd.
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081

          envFrom:
            - configMapRef:
                name: dlq-streaming-config
            - secretRef:
                name: dlq-streaming-secret

          # Override JVM flags for the test environment.
          # ZGC with MaxRAMPercentage=75 may exceed the 256Mi container limit
          # when combined with native memory (off-heap). Use G1GC with lower
          # MaxRAMPercentage. This is intentionally simpler than production
          # ZGC config — the test verifies deployment behaviour, not GC policy.
          #
          # DLQ_WORKER_ID is injected from metadata.name via the Downward API so
          # the running pod uses its own pod name as the DB lease worker identity.
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=50
                -XX:+UseG1GC
                -Djava.security.egd=file:/dev/./urandom
            - name: DLQ_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            failureThreshold: 18
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5

          resources:
            requests:
              cpu: "50m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 10
---
# NodePort service so the test can connect from outside k3s via mapped port.
apiVersion: v1
kind: Service
metadata:
  name: dlq-streaming
  namespace: default
  labels:
    app: dlq-streaming
spec:
  type: NodePort
  selector:
    app: dlq-streaming
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      nodePort: 30081
      protocol: TCP



