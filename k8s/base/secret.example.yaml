---
# Secret template for dlq-streaming.
#
# !! DO NOT COMMIT REAL VALUES !!
# Replace the placeholder values before applying to any cluster.
#
# Recommended production approach:
#   - Use a secrets manager (Vault, AWS Secrets Manager, Azure Key Vault).
#   - Use the External Secrets Operator to sync secrets into K8s.
#   - Alternatively use Sealed Secrets (Bitnami) for GitOps-safe encryption.
#
# To apply manually (replace values first):
#   kubectl -n dlq-streaming create secret generic dlq-streaming-secret \
#     --from-literal=SPRING_DATASOURCE_URL='jdbc:postgresql://postgres:5432/dlq' \
#     --from-literal=SPRING_DATASOURCE_USERNAME='dlq_user' \
#     --from-literal=SPRING_DATASOURCE_PASSWORD='CHANGE_ME' \
#     --from-literal=DLQ_DRAIN_API_KEY='CHANGE_ME'
apiVersion: v1
kind: Secret
metadata:
  name: dlq-streaming-secret
  namespace: dlq-streaming
  labels:
    app.kubernetes.io/name: dlq-streaming
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # PostgreSQL JDBC URL — include socketTimeout to avoid indefinite hangs.
  # The socketTimeout parameter was validated by the PostgresNetworkChaosTest.
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/dlq?socketTimeout=5"
  SPRING_DATASOURCE_USERNAME: "CHANGE_ME"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"

  # Optional: bearer token required by POST /drain/trigger.
  # Remove or leave empty to disable API key protection (use NetworkPolicy instead).
  DLQ_DRAIN_API_KEY: ""

