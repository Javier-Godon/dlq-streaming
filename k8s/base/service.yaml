---
# ClusterIP Service for dlq-streaming.
# Only the CronJob (or any in-cluster caller) needs to reach port 8080.
# The management port 8081 is not exposed outside the cluster.
#
# For ingress-based external access, add an Ingress resource in the overlay.
apiVersion: v1
kind: Service
metadata:
  name: dlq-streaming
  namespace: dlq-streaming
  labels:
    app.kubernetes.io/name: dlq-streaming
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dlq-streaming
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP

