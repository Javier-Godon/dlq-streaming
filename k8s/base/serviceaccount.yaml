---
# Dedicated ServiceAccount for dlq-streaming.
# Principle of least privilege: the pod does NOT use the default SA.
# The default SA is often granted excessive cluster permissions by platform tooling.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dlq-streaming
  namespace: dlq-streaming
  labels:
    app.kubernetes.io/name: dlq-streaming
    app.kubernetes.io/component: serviceaccount
automountServiceAccountToken: false

