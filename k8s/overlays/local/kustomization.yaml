---
# Kustomize overlay for local Kubernetes development (kind / minikube).
# Apply with: kubectl apply -k k8s/overlays/local
#
# Differences from base:
#   - Uses NodePort service for direct access from the host.
#   - Reduces resource requests for resource-constrained local clusters.
#   - Uses in-memory receiver (no Data Prepper needed locally).
#   - Assumes the image has already been loaded via:
#       kind load docker-image dlq-streaming:local
#     or:
#       minikube image load dlq-streaming:local
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Override the image tag for locally built images.
images:
  - name: ghcr.io/bluesolution/dlq-streaming
    newName: dlq-streaming
    newTag: local

# Patch deployment to use local image pull policy and reduced resources.
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dlq-streaming
        namespace: dlq-streaming
      spec:
        template:
          spec:
            containers:
              - name: dlq-streaming
                imagePullPolicy: Never
                resources:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "500m"
                    memory: "256Mi"

  # Patch ConfigMap with local values (in-memory receiver, no Data Prepper).
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: dlq-streaming-config
        namespace: dlq-streaming
      data:
        DLQ_RECEIVER_TYPE: "in-memory"

  # Patch Service to expose NodePort for direct host access.
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: dlq-streaming
        namespace: dlq-streaming
      spec:
        type: NodePort
        ports:
          - name: http
            port: 8080
            targetPort: http
            nodePort: 30080
          - name: management
            port: 8081
            targetPort: management
            nodePort: 30081

